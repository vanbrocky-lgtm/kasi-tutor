<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kasi Tutor</title>

<style>
body {
    font-family: Arial;
    background: black;
    color: white;
    text-align: center;
}

button {
    background: red;
    color: white;
    padding: 10px;
    border: none;
    margin: 5px;
    cursor: pointer;
}

.card {
    background: #222;
    padding: 20px;
    margin: 10px;
    border-radius: 10px;
}

.card:hover {
    background: red;
}   


/* NAVBAR */
nav {
    display: flex;
    justify-content: space-between;
    padding: 15px;
    background: black;
}

nav h2 {
    color: red;
}

nav ul {
    display: flex;
    list-style: none;
    gap: 15px;
}

nav a {
    color: white;
    text-decoration: none;
    font-weight: bold;
}

nav a:hover {
    color: red;
}

/* BUTTON */
.btn {
    padding: 8px 15px;
    background: red;
    border: none;
    color: white;
    cursor: pointer;
    border-radius: 5px;
}

/* HEADER */
header {
    text-align: center;
    padding: 40px;
    background: red;
}

/* SECTIONS */
.section {
    background: white;
    color: black;
    margin: 15px;
    padding: 20px;
    border-left: 8px solid red;
    border-radius: 8px;
}

/* QUIZ */
.question {
    background: #eee;
    padding: 10px;
    margin-top: 10px;
}

/* LOGIN POPUP */
#loginBox {
    display:none;
    position:fixed;
    top:30%;
    left:50%;
    transform:translate(-50%,-50%);
    background:white;
    padding:20px;
    border-radius:10px;
    color:black;
    width:300px;
}

/* CONTACT */
.contact {
    text-align:center;
    padding:30px;
    background:#111;
}

/* FOOTER */
footer {
    background:red;
    text-align:center;
    padding:10px;
}
</style>
</head>
<body>

<!-- LOGIN PAGE (ONLY THING USER SEES FIRST) -->
<div id="loginPage">
    <h2>Kasi Tutor Login</h2>

    <input id="username" placeholder="Enter Name"><br><br>

    <select id="grade">
        <option value="">Select Grade</option>
        <option value="10">Grade 10</option>
        <option value="11">Grade 11</option>
        <option value="12">Grade 12</option>
    </select><br><br>

    <button onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" style="display:none;">

    <h2 id="welcomeMsg"></h2>
    <button onclick="logout()">Logout</button>

    <!-- GRADE 10 -->
    <div id="grade10" style="display:none;">
        <div class="card" onclick="toggle('chap10')">
            <h3>📘 Grade 10</h3>
        </div>
        <div id="chap10" style="display:none;">
            <p>Basic Accounting Concepts</p>
        </div>
    </div>

    <!-- GRADE 11 -->
    <div id="grade11" style="display:none;">
        <div class="card" onclick="toggle('chap11')">
            <h3>📘 Grade 11</h3>
        </div>
        <div id="chap11" style="display:none;">
            <p>Financial Statements</p>
        </div>
    </div>

    <!-- GRADE 12 -->
    <div id="grade12" style="display:none;">
        <div class="card" onclick="toggle('chap12')">
            <h3>📘 Grade 12</h3>
        </div>
        <div id="chap12" style="display:none;">
            <p>Income Statement</p>
            <p>VAT</p>
            <p>Depreciation</p>
        </div>
    </div>

    <!-- QUIZ -->
    <h3>Quiz</h3>

    <p>VAT rate?</p>
    <input type="radio" name="q1" value="0"> 10%<br>
    <input type="radio" name="q1" value="1"> 15%<br>

    <br>
    <button onclick="submitQuiz()">Submit</button>

    <h4 id="scoreDisplay"></h4>

</div>

<!-- CHATBOT -->
<button onclick="toggleChat()" style="position:fixed;bottom:20px;right:20px;">💬</button>

<div id="chatBox" style="display:none;position:fixed;bottom:80px;right:20px;background:white;color:black;padding:10px;width:250px;">
    <h3>Kasi Tutor Bot</h3>
    <div id="chatMessages"></div>
    <input id="userInput">
    <button onclick="sendMessage()">Send</button>
</div>

<script>

// LOGIN
function login() {
    let name = username.value;
    let grade = document.getElementById("grade").value;

    if(!name || !grade) {
        alert("Enter name and grade");
        return;
    }

    localStorage.setItem("name", name);
    localStorage.setItem("grade", grade);

    loadDashboard();
}

// LOAD DASHBOARD
function loadDashboard() {
    let name = localStorage.getItem("name");
    let grade = localStorage.getItem("grade");

    if(!name) return;

    loginPage.style.display = "none";
    dashboard.style.display = "block";

    welcomeMsg.innerText = "Welcome " + name + " (Grade " + grade + ")";

    // Hide all grades
    grade10.style.display = "none";
    grade11.style.display = "none";
    grade12.style.display = "none";

    // Show only selected grade
    document.getElementById("grade" + grade).style.display = "block";

    let score = localStorage.getItem("score_" + name);
    if(score) scoreDisplay.innerText = "Previous Score: " + score;
}

// LOGOUT
function logout() {
    localStorage.clear();
    location.reload();
}

// TOGGLE CHAPTERS
function toggle(id) {
    let el = document.getElementById(id);
    el.style.display = el.style.display === "none" ? "block" : "none";
}

// QUIZ
function submitQuiz() {
    let q1 = document.querySelector('input[name="q1"]:checked');

    if(!q1) return alert("Answer question");

    let score = +q1.value;

    let name = localStorage.getItem("name");
    localStorage.setItem("score_" + name, score);

    scoreDisplay.innerText = "Score: " + score + "/1";
}

// CHATBOT
function toggleChat() {
    chatBox.style.display = chatBox.style.display === "none" ? "block" : "none";
}

function sendMessage() {
    let input = userInput.value.toLowerCase();

    let response = "Ask accounting question";

    if(input.includes("vat")) response = "VAT is 15%";
    if(input.includes("income statement")) response = "Income Statement shows profit or loss";

    chatMessages.innerHTML += "<p>You: "+input+"</p>";
    chatMessages.innerHTML += "<p>Bot: "+response+"</p>";

    userInput.value = "";
}

// AUTO LOGIN
window.onload = loadDashboard;

</script>

</body>
